        <div class="row g-4 justify-content-center">
            <div class="col-6 col-lg-3" onclick="showContinent('europa')">
                <div class="continent-card glass-panel border-gold p-4 text-center position-relative">
                    <div class="continent-badge">23</div>

                </div>
            </div>
            <div class="col-6 col-lg-3" onclick="showContinent('africa')">
                <div class="continent-card glass-panel border-gold p-4 text-center position-relative">
                    <div class="continent-badge">1</div>
                    <i class="bi bi-sun display-3 text-gold"></i>
                    <h2 class="h5 mt-3 uppercase font-mono">Africa</h2>
                </div>
            </div>
            <div class="col-6 col-lg-3" onclick="showContinent('america')">
                <div class="continent-card glass-panel border-gold p-4 text-center position-relative">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const travelData = {
            europa: [
                { paese: "Italia", periodo: "Dal 1999 ad oggi", crew: "Famiglia", spot: "Matera", desc: "La mia casa, un viaggio infinito."},
                { paese: "Spagna", periodo: "Dicembre 2021", crew: "Amici", spot: "Barcellona/Madrid", desc: "Dalla Sagrada Familia al Bernabeu."},
                { paese: "Portogallo", periodo: "Dicembre 2023", crew: "Amici", spot: "Lisbona", desc: "Torre di Belem e Carmo Convent."},

                { paese: "Scozia", periodo: "Agosto 2026", crew: "Famiglia", spot: "Edimburgo", desc: "Pronto per esplorare le Highlands."},
                { paese: "Danimarca", periodo: "Febbraio 2025", crew: "Amici", spot: "Copenaghen", desc: "I colori di Nyhavn e il design nordico."},
                { paese: "Svezia", periodo: "Dicembre 2024", crew: "Amici", spot: "Stoccolma", desc: "Alci e foreste innevate."},
                { paese: "Finlandia", periodo: "Settembre 2023", crew: "Amici", spot: "Lapponia", desc: "Sotto l'Aurora Boreale."},

                { paese: "Olanda", periodo: "Febbraio 2025", crew: "Amici", spot: "Amsterdam", desc: "Canali e mulini a vento."},
                { paese: "Francia", periodo: "Dicembre 2019", crew: "Amici", spot: "Parigi / Disneyland", desc: "La magia di Versailles."},
                { paese: "Principato di Monaco", periodo: "Agosto 2016", crew: "Amici", spot: "Monaco", desc: "Lusso e adrenalina in Costa Azzurra."},
                { paese: "San Marino", periodo: "Agosto 2020", crew: "Amici", spot: "Torri di San Marino", desc: "Un borgo medievale sospeso nel tempo."},
                { paese: "Città del Vaticano", periodo: "Luglio 2021", crew: "Amici", spot: "San Pietro", desc: "L'arte millenaria della Cupola."},
                { paese: "Ungheria", periodo: "Agosto 2024", crew: "Amici", spot: "Budapest", desc: "Il fascino del Danubio tra Buda e Pest."},
                { paese: "Austria", periodo: "Aprile 2016", crew: "Scuola", spot: "Vienna", desc: "Sacher e storia asburgica."},
                { paese: "Svizzera", periodo: "Ogni Inverno", crew: "Famiglia", spot: "Crans-Montana", desc: "Dove ho imparato a sciare."},

            ],
            africa: [{ paese: "Marocco", periodo: "Agosto 2025", crew: "Amici", spot: "Marrakech / Deserto", desc: "I mercati e le dune infinite."}],

            asia: [
                { paese: "Oman", periodo: "Agosto 2026", crew: "Amici", spot: "Muscat", desc: "Tradizione araba e paesaggi desertici."},
                { paese: "Turchia", periodo: "Agosto 2025", crew: "Amici", spot: "Istanbul / Cappadocia", desc: "Le mongolfiere all'alba."}
            ]
        };

        function showContinent(cont) {
            const section = document.getElementById('details-section');
            const container = document.getElementById('countries-container');
            document.getElementById('continent-title').innerText = cont;
            container.innerHTML = "";
            travelData[cont].forEach((item) => {
                container.innerHTML += `
                    <div class="col-md-6 col-lg-4 animate-fade-in">
                        <div class="glass-panel p-4 border-gold h-100 shadow-hover">
                            <h3 class="text-gold h4 fw-bold uppercase font-mono mb-3">${item.paese}</h3>
                            <p class="small opacity-75 italic mb-4">"${item.desc}"</p>
                            <div class="p-3 bg-darker-blue border border-gold-subtle rounded font-mono x-small">
                                <div><span class="text-gold">PERIOD:</span> ${item.periodo}</div>
                                <div><span class="text-gold">CREW:</span> ${item.crew}</div>
                                <div><span class="text-gold">SPOT:</span> ${item.spot}</div>
                            </div>
                        </div>
                    </div>`;
            });
            section.classList.remove('d-none');
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
    <style>
        .x-small { font-size: 0.75rem; }
        .shadow-hover:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
